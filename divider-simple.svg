<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 40" fill="none">
  <!-- Simple hand-drawn crescent moon + botanical accent divider -->
  <g stroke="#B69B68" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left branch extending toward center -->
    <path d="M80,20 C100,19 120,21 140,19 C155,18 165,19 175,20" stroke-width="1" opacity="0.4"/>
    <!-- Small leaves on left branch -->
    <path d="M110,20 C108,16 106,13 108,11" stroke-width="0.6" opacity="0.25"/>
    <path d="M108,11 C109,13 110,16 110,20" stroke-width="0.4" opacity="0.15" fill="#B69B68" fill-opacity="0.03"/>
    <path d="M135,19 C137,15 140,12 142,11" stroke-width="0.6" opacity="0.25"/>
    <path d="M142,11 C140,14 138,17 135,19" stroke-width="0.4" opacity="0.15" fill="#B69B68" fill-opacity="0.03"/>

    <!-- Center crescent moon -->
    <path d="M192,12 C186,14 182,18 182,22 C182,26 186,30 192,32 C188,29 186,25 186,22 C186,18 188,14 192,12 Z"
          stroke-width="0.9" opacity="0.4" fill="#B69B68" fill-opacity="0.08"/>
    <!-- Tiny stars near moon -->
    <circle cx="198" cy="16" r="0.8" fill="#B69B68" opacity="0.25"/>
    <circle cx="202" cy="24" r="0.6" fill="#B69B68" opacity="0.2"/>
    <circle cx="196" cy="28" r="0.5" fill="#B69B68" opacity="0.18"/>

    <!-- Right branch extending from center -->
    <path d="M210,20 C225,19 240,21 260,19 C280,18 300,20 320,20" stroke-width="1" opacity="0.4"/>
    <!-- Small leaves on right branch -->
    <path d="M245,20 C247,16 250,13 252,11" stroke-width="0.6" opacity="0.25"/>
    <path d="M252,11 C250,14 248,17 245,20" stroke-width="0.4" opacity="0.15" fill="#B69B68" fill-opacity="0.03"/>
    <path d="M280,19 C278,15 276,12 274,11" stroke-width="0.6" opacity="0.25"/>
    <path d="M274,11 C276,14 278,17 280,19" stroke-width="0.4" opacity="0.15" fill="#B69B68" fill-opacity="0.03"/>

    <!-- Tiny end dots -->
    <circle cx="85" cy="20" r="1" fill="#B69B68" opacity="0.2"/>
    <circle cx="315" cy="20" r="1" fill="#B69B68" opacity="0.2"/>
  </g>
</svg>