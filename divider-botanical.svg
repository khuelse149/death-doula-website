    <!-- Dried lavender-like head -->
    <ellipse cx="423" cy="14" rx="3" ry="4" stroke-width="0.8" opacity="0.5" fill="#B69B68" fill-opacity="0.08"/>
    <ellipse cx="422" cy="10" rx="2.5" ry="3" stroke-width="0.7" opacity="0.45" fill="#B69B68" fill-opacity="0.06"/>
    <ellipse cx="423" cy="7" rx="2" ry="2.5" stroke-width="0.6" opacity="0.4" fill="#B69B68" fill-opacity="0.04"/>
