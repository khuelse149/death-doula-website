    <!-- Leaf shapes -->
    <path d="M299,22 C306,19 311,16 312,14 C310,17 305,20 299,22 Z" fill="#B69B68" fill-opacity="0.05" stroke="none"/>
    <path d="M297,28 C290,25 286,24 285,22 C287,24 292,26 297,28 Z" fill="#B69B68" fill-opacity="0.05" stroke="none"/>

